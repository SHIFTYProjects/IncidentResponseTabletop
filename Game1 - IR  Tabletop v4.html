<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emergency Response Tabletop Exercise</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#e5e7eb;transition:background 0.5s;height:100vh;display:flex;flex-direction:column;}
.flash-win{animation:flashWin 1s 3; background:#166534 !important;}
.flash-lose{animation:flashLose 1s 3; background:#991b1b !important;}
@keyframes flashWin{0%,100%{background:#16a34a;}50%{background:#0f172a;}}
@keyframes flashLose{0%,100%{background:#dc2626;}50%{background:#0f172a;}}
header{padding:20px;background:#020617;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#note{color:#93c5fd;font-size:18px}
#game{display:flex;flex:1;overflow:hidden}
#left{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column}
#right{width:42%;background:#020617;padding:20px;display:none;flex-direction:column;gap:18px;overflow-y:auto;min-width:320px}
#board {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(var(--card-width, 200px), 1fr));
    gap: 22px;
    width: 100%;
    transition: all 0.2s ease;
}

.card {
    padding: 22px;
    border-radius: 16px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s ease;
    word-break: break-word;
    font-size: var(--card-font, 14px);
}


.category{display:flex;flex-direction:column;gap:18px}
.card{background:#020617;border-radius:16px;padding:22px;border:2px solid transparent;cursor:pointer;transition:transform 0.2s;word-break:break-word;}
.card:hover{transform:scale(1.02);}
.card.selected{border-color:#22c55e}
.card.greyed{opacity:.35;cursor:default}
.card h3{margin:6px 0}
.card p{font-size:14px;line-height:1.45}
.cost{margin-top:8px;font-weight:bold;color:#facc15}
.header-identify{background:#2563eb;padding:8px 12px;border-radius:10px}
.header-protect{background:#16a34a;padding:8px 12px;border-radius:10px}
.header-detect{background:#ca8a04;padding:8px 12px;border-radius:10px}
.header-respond{background:#dc2626;padding:8px 12px;border-radius:10px}
#controls{margin-top:30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
#wallet{font-size:26px;font-weight:800}
button{background:#2563eb;color:white;border:none;padding:12px 20px;border-radius:12px;font-size:16px;cursor:pointer;transition:0.3s;}
button:disabled{background:#475569;cursor:not-allowed}

#injectBox{background:#020617;padding:22px;border-radius:16px;white-space:pre-line;line-height:1.6}
#injectBox, #incidentLog {
    
    line-height: 1.6;  /* improves readability */
}


#incidentLog{background:#020617;padding:20px;border-radius:16px;max-height:240px;overflow-y:auto;font-size:14px}


#summaryBox {
    background:#020617;
    padding:22px;
    border-radius:16px;
    display:none;
    font-size:35px;          /* adjust as needed */
    line-height:1.6;         /* keeps spacing readable */
}

#newGame{display:none;margin-top:15px;}
.shrink .card{padding:12px;font-size:12px}
.green{color:#22c55e;font-weight:bold;}
.red{color:#ef4444;font-weight:bold;}
.yellow{color:#facc15;}

/* --- NEW SCORE STYLING --- */
#scoreBox {
    background: #1e293b;
    border: 2px solid #3b82f6;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
    margin-bottom: 10px;
}
#scoreLabel {
    display: block;
    font-size: 14px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: bold;
    margin-bottom: 5px;
}
#score {
    display: block;
    font-size: 48px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}
/* ------------------------- */


/* Responsive adjustments */
@media(max-width:1200px){
    #board{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:900px){
    #game{flex-direction:column}
    #left{flex:unset;min-height:50vh}
    #right{width:100%;max-height:50vh}
    #board{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
    #board{grid-template-columns:1fr}
}

.card .desc {
    display: block; /* default before game starts */
    transition: all 0.3s ease;
}

.card.hide-desc .desc {
    display: none;
}

.card.expand-desc .desc {
    display: block;
}

</style>
</head>

<header>
    <h1>Emergency Response Tabletop Exercise</h1>
    <div id="headerCenter"><span id="wallet">Budget: $500,000</span></div>
    <div id="headerRight">
        <button id="startGame" disabled>Start Game</button>
        <button id="newGame" style="display:none">New Game</button>

    <div>

    </div>
    <div id="summaryBox"></div>

</div>

{title:"Employee Training",category:"Identify",cost:35000,desc:"Educates staff on social engineering and suspicious activity reporting including physical incidents."},
{title:"Emergency Procedures",category:"Identify",cost:30000,desc:"Clear escalation and verification steps for fraud or suspicious requests.  This includes having a way to report suspicious emails and having a verification process for password, Payroll, and MFA Changes."},
{title:"Asset Inventory",category:"Identify",cost:25000,desc:"Comprehensive list of critical systems and data assets.  This is number 1 on the NIST Cyber Security Framework.  Knowing what you have and where it is extremely important.  If an unknown device shows up in your system, or If a laptop goes missing, how you would you find out where it went and who it belongs to?"},
{title:"Risk Assessment",category:"Identify",cost:40000,desc:"Identify and prioritize cyber risks across the organization.  This includes having regular 3rd Party Penetration Tests and Developing Acceptable Risk Standards."},
{title:"Phishing Campaigns",category:"Identify",cost:25000,desc:"Simulated phishing tests to evaluate user readiness.  This increases awareness of what a suspicious email looks like and can prevent data loss, Ransomware and Hundreds of hours of downtime."},
{title:"Firewall",category:"Protect",cost:75000,desc:"Filters Network traffic at network boundaries.  This is what is used to try and establish communication rules between sites and devices."},
{title:"Antivirus",category:"Protect",cost:50000,desc:"Attempts to Detect and block malware before it executes. The average Antivirus or A/V takes around a minute to catch a suspicious execution.  Even if your A/V does catch it, it may not remediate everything that is done in that minute it takes to detect and quarantine the files."},
{title:"Multi-factor Auth",category:"Protect",cost:90000,desc:"Known as MFA, this Adds an extra security layer to user logins.  This includes things like 1 Time Passcodes (OTP) or a message (Push) or alert sent to a persons device to verify you are trying to log in. "},
{title:"Encryption",category:"Protect",cost:85000,desc:"Protects sensitive data at rest and in transit.  Being able to encrypt your Privilaged Data as it is going across your network can prevent your data from being sniffed as its going across your network. This can be especially important with your Backups."},
{title:"Patch Management",category:"Protect",cost:60000,desc:"Timely installation of security patches to prevent exploits.  Having a way to push security updates known as Patches is key to try and prevent known bugs and Critical Vulnerabilities and Exposures (CVE) on your Network."},
{title:"SIEM Monitoring",category:"Detect",cost:100000,desc:"Centralized alerting for suspicious security events.  A (Security Information and Event Management) System is an expensive, but crucial for asissting in detecting anomalies and suspicious actions on your network."},
{title:"User Activity Logs",category:"Detect",cost:30000,desc:"Monitoring of user behavior to detect anomalies. This usually entails purchasing sofware to alert you of any anomalies in user logins, or users logging in a suspious times or from locations not typical of your organization."},
{title:"IDS",category:"Detect",cost:80000,desc:"Detects unauthorized network activity or intrusions.  An Intrusion Detection System or (IDS) is sometimes part of your overall security suite.  This is specifically designed to detect unauthorized activity."},
{title:"Endpoint Detection",category:"Detect",cost:60000,desc:"Monitors endpoints for malware and suspicious behavior.  This can be included in your Antivirus purchase, but isnt always included.  This can also sometimes contain features that allow you to limit what kind of software can be installed."},
{title:"Threat Intelligence",category:"Detect",cost:40000,desc:"External threat information to inform security decisions.  This information typically comes from a 3rd party System Operation Center (SOC) or Network Operations Center (NOC) monitoring your network. This information could even come from a Educational Network Provider (*EN) or Internet Service Provider (ISP). "},
{title:"Incident Response Team",category:"Respond",cost:100000,desc:"Dedicated team to manage and respond to incidents.  Most companies do not have this.  Instead they have 3rd party vendors they will interact with in case of an event, or in some cases, your Cybersecurity Insurance will have an In house Team, or preferred Vendor for this."},
{title:"Backup & Restore",category:"Respond",cost:60000,desc:"The ability to Recover systems after data loss or attacks.  Having both an Onsite and Offsite backup solution is critical to maintain business operations.  These are often expensive and difficult to maintain, but can take the amount of time to recover from > 6 months, to just weeks."},
{title:"Disaster Recovery Plan",category:"Respond",cost:80000,desc:"Plan to restore operations after major incidents.  Disaster recovery plans arent just an IT problem.  There are many pieces to the puzzle and your whole organization needs to be involved.  PR, Emergency Communication, and even how to let staff securely in and out of your locatitons can be challenging in the event of an outage."},
{title:"Communications Plan",category:"Respond",cost:40000,desc:"Control internal and external messaging during incidents.  This is an important piece in your Disaster recovery plan that is often overlooked.   How and Who can communicate to Staff, The Public or Press in the event of an outage is challenging when critical systems are impacted."},
{title:"Legal & Compliance",category:"Respond",cost:50000,desc:"Ensure regulatory and legal requirements are met.  This includes, but not limited to: Notification laws, Data Privacy Agreements (DPA), and compliance with the Privacy acts such as:  HIPAA, FERPA etc."}
];

// Shuffle inject deck
function getShuffledInjectDeck(){
    let deck=[...injects];
    for(let i=deck.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [deck[i],deck[j]]=[deck[j],deck[i]];
    }
    return deck.slice(0,maxRounds);
}

function initGame(){
    wallet=500000;
    score=50;
    round=1;
    criticalHits=0;
    locked=false;
    gameOver=false;
    maxRounds=5;
    currentRound=0;

    document.getElementById("wallet").textContent=`Budget: $${wallet.toLocaleString()}`;
    document.getElementById("score").textContent=score;
    document.getElementById("right").style.display="none";
    document.getElementById("note").textContent="Choose Your Protection Cards";
    document.getElementById("incidentLog").innerHTML="";
    document.getElementById("injectBox").innerHTML="";
    document.getElementById("summaryBox").style.display="none";
    document.getElementById("startGame").style.display="inline-block";
    document.getElementById("newGame").style.display="none";

    cardsData.forEach(c=>c.selected=false);
    render();
}
function render() {
    const board = document.getElementById("board");
    board.innerHTML = "";

    ["Identify", "Protect", "Detect", "Respond"].forEach(cat => {
        const col = document.createElement("div");
        col.className = "category";

        cardsData.filter(c => c.category === cat).forEach(card => {
            const d = document.createElement("div");
            d.className = "card";
            if (card.selected) d.classList.add("selected");
            if (locked && !card.selected) d.classList.add("greyed");

            d.innerHTML = `<div class="header-${cat.toLowerCase()}">${cat}</div>
                <h3>${card.title}</h3>
                <p class="desc">${card.desc.replace(/\n/g,"<br>")}</p>
                <p class="cost">Cost: $${card.cost.toLocaleString()}</p>`;

            if (gameOver) d.innerHTML += `<p class="yellow">Estimated Loss Avoided: $${card.cost.toLocaleString()}</p>`;

            d.onclick = () => {
                if (!locked) {
                    if (card.selected) { card.selected = false; wallet += card.cost; }
                    else if (wallet >= card.cost) { card.selected = true; wallet -= card.cost; }
                    document.getElementById("wallet").textContent = `Budget: $${wallet.toLocaleString()}`;
                    render(); // Re-render keeps slider zoom
                    checkStart();
                } else {
                    // During gameplay: expand/collapse description
                    d.classList.toggle('expand-desc');
                }
            };

            col.appendChild(d);
        });

        board.appendChild(col);
    });

    // === APPLY CURRENT SLIDER ZOOM AFTER RENDERING CARDS ===
    const scale = zoomSlider.value;

    // Update CSS variable for grid width
    board.style.setProperty('--card-width', `${200 * scale}px`);

    // Update fonts without touching widths (keeps grid layout intact)
    document.querySelectorAll('.card').forEach(card => {
        card.style.fontSize = `${14 * scale}px`;
    });

    document.querySelectorAll('.card h3').forEach(title => {
        title.style.fontSize = `${16 * scale}px`;
    });

    document.querySelectorAll('.card .desc').forEach(desc => {
        desc.style.fontSize = `${12 * scale}px`;
    });
}



function checkStart(){
    document.getElementById("startGame").disabled=
    !["Identify","Protect","Detect","Respond"].every(cat=>cardsData.some(c=>c.category===cat&&c.selected));
}

document.getElementById("startGame").onclick=()=>{
    locked=true;
    document.getElementById("right").style.display="flex";
	document.getElementById("fontControls").style.display = "block";

    document.getElementById("left").classList.add("shrink");
    currentRound=0;
    injectDeck=getShuffledInjectDeck();
    document.getElementById("note").textContent=`Game In Progress – ROUND 1`;
    document.getElementById("startGame").style.display="none";
    document.getElementById("drawInject").disabled=false;
	document.querySelectorAll('.card').forEach(c => c.classList.add('hide-desc'));

};

document.getElementById("drawInject").onclick = () => {
    if(gameOver) return;
    if(currentRound >= injectDeck.length) return;

    const inject = injectDeck[currentRound++];
    let delta = 0;
    let text = `<span class="red" style="font-weight:800;">INJECT CARD – ${inject.event}</span>\nScenario: ${inject.description}\n\n`;

    inject.impacts.forEach(i => {
        const has = cardsData.some(c => c.selected && c.title === i.mitigatedBy);
        if(has) {
            delta += 5;
            text += `• <span class="green">${i.text} – Protected by ${i.mitigatedBy} (+5)</span>\n\n`;
        } else {
            delta -= 15;
            text += `• <span class="red">${i.text} – Unprotected (−15, could have been prevented by ${i.mitigatedBy})</span>\n\n`;
        }
    });

    text += `<button id="revealImpactBtn" onclick="document.getElementById('impactDetails').style.display='block'; this.style.display='none';" style="margin-top: 10px; margin-bottom: 10px; font-size: 14px; padding: 8px 16px;">View Real World Impact & Remediation</button>\n`;
    text += `<div id="impactDetails" style="display:none;">\n`;
    text += `<span class="yellow">Real World Impact:</span>\n${inject.stats}\n\n`;
    text += `<span class="yellow">Remediation:</span>\n${inject.remediation}\n`;
    text += `</div>`;

    // Replace all previous content in injectBox
    const injectBox = document.getElementById("injectBox");
    injectBox.innerHTML = text;

    // Update score
    score += delta;
    document.getElementById("score").textContent = score;

    // Track critical hits
    if(delta <= -20) criticalHits++;

    // Prepend to incident log
    const log = document.getElementById("incidentLog");
    log.innerHTML = `<div>Round ${currentRound}: ${inject.event} (${delta})</div>` + log.innerHTML;

    // Update round note
    document.getElementById("note").textContent = `Game In Progress – ROUND ${currentRound + 1}`;

    // Check game over conditions
    if(score <= 0){
        score = 0;
        gameOver = true;
        document.getElementById("score").textContent = score;
        document.body.classList.add("flash-lose");
        setTimeout(() => document.body.classList.remove("flash-lose"), 3000);
        endGame(true);
        return;
    }

    if(currentRound >= maxRounds){
        gameOver = true;
        document.body.classList.add("flash-win");
        setTimeout(() => document.body.classList.remove("flash-win"), 3000);
        endGame(false);
    }
};


function endGame(failed){
    document.getElementById("drawInject").disabled=true;
    document.getElementById("note").textContent=failed?"ALL SYSTEMS COMPROMISED":"Exercise Complete";

    let suggestions=[];
    if(!cardsData.some(c=>c.selected&&c.title==="Multi-factor Auth"))suggestions.push("Consider adding Multi-factor Authentication.");
    if(!cardsData.some(c=>c.selected&&c.title==="SIEM Monitoring"))suggestions.push("Invest in centralized monitoring (SIEM).");
    if(!cardsData.some(c=>c.selected&&c.title==="Employee Training"))suggestions.push("Expand employee security training.");

    document.getElementById("summaryBox").style.display="block";
    document.getElementById("summaryBox").innerHTML=
    failed?
    `<strong class="red">GAME OVER</strong><br><br>All critical systems compromised. Business operations halted.`:
    `<strong class="green">YOU SURVIVED — FOR NOW</strong><br><br>
    Final Score: ${score}<br>
    Critical Service Impacts: ${criticalHits}<br><br>
    Cyber attacks are never fully preventable — only manageable.  This excersise was meant to show not only how difficult it is to prevent an attack, but how hard it is to recover with limited resources and personel.<br><br>
    <strong>Next Planning Steps:</strong><br>${suggestions.join("<br>")||"Your controls are well balanced."}`;

    document.getElementById("newGame").style.display="inline-block";
    render(); 
}

document.getElementById("newGame").onclick=()=>{
    initGame();
};

zoomSlider.addEventListener('input', () => {
    const scale = zoomSlider.value;

    // Resize card width
    const newWidth = 200 * scale; // base width 200px
    board.style.setProperty('--card-width', `${newWidth}px`);

    // Resize fonts
    document.querySelectorAll('.card').forEach(card => {
        card.style.fontSize = `${14 * scale}px`; // base 14px for card content
    });

    document.querySelectorAll('.card h3').forEach(title => {
        title.style.fontSize = `${16 * scale}px`; // base 16px for card title
    });

    document.querySelectorAll('.card .desc').forEach(desc => {
        desc.style.fontSize = `${12 * scale}px`; // base 12px for description
    });
});



initGame();
const fontSlider = document.getElementById('fontSlider');

fontSlider.addEventListener('input', () => {
    const size = fontSlider.value + 'px';
    document.getElementById('injectBox').style.fontSize = size;
    document.getElementById('incidentLog').style.fontSize = size;
});

</script>
